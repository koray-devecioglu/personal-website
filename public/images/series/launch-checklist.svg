<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Launch day checklist illustration</title>
  <desc id="desc">A checklist board with completed tasks and one coffee cup, representing launch day preparation.</desc>
  <rect width="1200" height="630" fill="#f3f6fb" />
  <rect x="170" y="60" width="860" height="510" rx="24" fill="#ffffff" stroke="#bac6d8" stroke-width="5" />
  <text x="230" y="130" font-family="Inter, sans-serif" font-size="40" font-weight="700" fill="#2c3b52">Launch day checklist</text>
  <g font-family="Inter, sans-serif" font-size="28" fill="#2c3b52">
    <rect x="230" y="180" width="38" height="38" rx="8" fill="#39b88f" />
    <path d="M240 198l10 10 17-19" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" />
    <text x="290" y="210">DNS and SSL verified</text>
    <rect x="230" y="250" width="38" height="38" rx="8" fill="#39b88f" />
    <path d="M240 268l10 10 17-19" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" />
    <text x="290" y="280">CI green across all gates</text>
    <rect x="230" y="320" width="38" height="38" rx="8" fill="#39b88f" />
    <path d="M240 338l10 10 17-19" stroke="#fff" stroke-width="5" fill="none" stroke-linecap="round" />
    <text x="290" y="350">Search Console + Bing submitted</text>
    <rect x="230" y="390" width="38" height="38" rx="8" fill="#ffcc66" />
    <text x="243" y="418" font-family="JetBrains Mono, monospace" font-size="28" fill="#6a4f1f">&amp;</text>
    <text x="290" y="420">Write real posts (ongoing)</text>
  </g>
  <rect x="820" y="420" width="140" height="120" rx="14" fill="#d8a56b" />
  <rect x="835" y="395" width="110" height="35" rx="10" fill="#e5bb88" />
  <ellipse cx="890" cy="520" rx="80" ry="18" fill="#dfe7f2" />
</svg>
