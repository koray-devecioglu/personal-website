name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  verify:
    name: Lint · typecheck · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist
          retention-days: 7

  e2e:
    name: E2E + a11y (Playwright + axe-core)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm test:e2e:install

      - name: Build
        run: pnpm build

      - name: E2E + a11y tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  lighthouse:
    name: Lighthouse CI (perf, a11y, best-practices, SEO budgets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run Lighthouse CI
        run: pnpm lhci

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lighthouse-report
          path: .lighthouseci
          retention-days: 14
          # `.lighthouseci` is a dotfile directory; upload-artifact
          # skips hidden paths by default and would otherwise report
          # "No files were found" even though LHCI wrote 30 reports.
          include-hidden-files: true

  lychee:
    name: Link check (lychee)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download built site
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Walk every HTML page produced by Astro. `--root-dir` must be
          # absolute so root-relative links (`/posts`, `/favicon.svg`)
          # resolve to files under `dist/` instead of bailing out.
          # The action owns `--output` itself; setting it via `args`
          # would collide with the `output` input below.
          args: >-
            --config lychee.toml
            --root-dir ${{ github.workspace }}/dist
            --no-progress
            --format markdown
            'dist/**/*.html'
          output: ./lychee-report.md
          fail: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload lychee report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: lychee-report
          path: lychee-report.md
          retention-days: 14
